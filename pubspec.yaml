name: glapod
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  pinput: ^5.0.0
  http: ^1.2.0
  shared_preferences: ^2.5.4
  device_info_plus: ^10.1.0
  url_launcher: ^6.3.0
  youtube_player_flutter: ^9.1.1
  cupertino_icons: ^1.0.8
  flutter_pdfview: ^1.3.2
  dio: ^5.4.0
  path_provider: ^2.1.2
  flutter_native_splash: ^2.4.0
  pdfx: ^2.4.0
  internet_file: ^1.2.0
  google_fonts: ^6.2.1
  image_picker: ^1.0.7
  http_parser: ^4.0.2
  video_player: ^2.8.1
  chewie: ^1.7.1
  share_plus: ^10.1.0
  font_awesome_flutter: ^10.7.0
  provider: ^6.1.1
  # Updated version to match your environment constraints
  dropdown_button2: ^2.3.9
  translator: any
  speech_to_text: ^7.0.0
  webview_flutter: ^4.10.0
  shimmer: ^3.0.0
  pretty_dio_logger: ^1.3.1
  cached_network_image: ^3.3.0
  flutter_widget_from_html: ^0.15.2
  flutter_widget_from_html_core: ^0.15.2
  flutter_math_fork: ^0.7.2





dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.jpeg
    - assets/images/logoo.png
    - assets/images/bot.jpeg
    - assets/images/top.jpeg
    - assets/images/abstract-green-background-with-rays-vector.jpg
    - assets/images/doodle.jpeg
    - assets/images/animals_doodle.jpeg

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/logo.png
  android_12:
    image: assets/images/logo.png
    color: "#ffffff"

dependency_overrides:
  syncfusion_flutter_pdfviewer: ^26.1.42
  device_info_plus: ^10.1.0